name: Mirror to GitHub

on:
  push:
    branches:
      - master
    tags:
      - '**'

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add GitHub remote
        run: |
          git remote add github git@github.com:cyso/traefik-requestid.git

      - name: Push branch to GitHub
        if: github.ref_type == 'branch'
        run: |
          git push github HEAD:${{ github.ref_name }} --force

      - name: Push tag to GitHub
        if: github.ref_type == 'tag'
        run: |
          git push github ${{ github.ref_name }} --force